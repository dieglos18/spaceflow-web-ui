name: spaceflow-stack

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:3000"
        VITE_AUTH_BEARER_TOKEN: "your-test-bearer-token"
    container_name: spaceflow-web-ui
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - spaceflow-network

networks:
  spaceflow-network:
    external: true
    name: spaceflow-network
